name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site bundle
        run: |
          mkdir -p _site/dietary-guard/scripts
          cp .github/skills/dietary-guard/SKILL.md _site/dietary-guard/SKILL.md
          cp .github/skills/dietary-guard/icon.png _site/dietary-guard/icon.png
          cp .github/skills/dietary-guard/config.json _site/dietary-guard/config.json
          cp .github/skills/dietary-guard/scripts/index.html _site/dietary-guard/scripts/index.html
          cp .github/skills/dietary-guard/scripts/dietary_guard.js _site/dietary-guard/scripts/dietary_guard.js
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
