<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dietary Guard Skill</title>
</head>
<body>
  <script src="./dietary_guard.js"></script>
  <script>
    window.ai_edge_gallery_get_result = async function (data) {
      try {
        const parsed = data && data.trim() ? JSON.parse(data) : {};
        const result = window.DietaryGuard.analyze(parsed);
        return JSON.stringify(result);
      } catch (error) {
        return JSON.stringify({
          error: error && error.message ? error.message : "Unknown Dietary Guard error.",
        });
      }
    };
  </script>
</body>
</html>
